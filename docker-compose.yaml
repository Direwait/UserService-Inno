version: '5'

services:
  postgres:
    image: 'postgres:15-alpine'
    container_name: 'userService-postgres'
    ports:
      - "5432:5432"
    environment:
      - 'POSTGRES_USER=${DB_USERNAME}'
      - 'POSTGRES_PASSWORD=${DB_PASSWORD}'
      - 'POSTGRES_HOST_AUTH_METHOD=trust'  # Можно тоже в .env вынести
      - 'POSTGRES_DB=${DB_NAME}'
    networks:
      - app-network  # Добавим сеть для изоляции
    volumes:
      - postgres_data:/var/lib/postgresql/data  # Добавьте это!

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - app-network

  app:
    build: .
    container_name: userService-inno
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_LIQUIBASE_ENABLED: "true"
      SPRING_LIQUIBASE_CHANGE_LOG: classpath:/db/changelog/db.changelog-master.xml
    depends_on:
      - postgres
      - redis
    networks:
      - app-network

volumes:
  postgres_data:
    driver: local
# Определяем сеть
networks:
  app-network:
    driver: bridge